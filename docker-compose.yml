services:
  attritioniq:
    build:
      context: .
      args:
        VITE_API_BASE_URL: /
    env_file:
      - .env.example
    environment:
      PORT: 8000
      BACKEND_CORS_ORIGINS: http://localhost:8000,http://127.0.0.1:8000,http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
